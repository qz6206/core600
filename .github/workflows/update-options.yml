name: 自动刷新期权异动数据

on:
  schedule:
    # 每天 1:00 UTC（美股收盘后 1 小时，期权数据已稳定）
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉取 Polygon 期权快照
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python3 scripts/fetch_polygon_options.py

      - name: 数据完整性 + 数量 sanity check
        run: python3 scripts/validate_data.py options

      - name: 检查变化
        id: check
        run: |
          if git diff --quiet data/options.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到期权数据变化"
          fi

      - name: 提交变化
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/options.json
          git commit -m "自动更新: 期权异动数据刷新

          Triggered by GitHub Actions (daily after-close)"
          # 防御并发 push 冲突 (其它 cron 或人工 push 同时发生)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || (echo "push 失败 (try $i), 5s 后重试" && sleep 5)
          done

      - name: 失败告警 (创建 GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 cron 失败: update-options (${new Date().toISOString().split('T')[0]})`,
              body: `## 自动刷新期权异动数据 失败\n\n[查看 workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['cron-failure']
            });
