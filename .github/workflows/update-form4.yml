name: 自动刷新 Form 4 数据

on:
  schedule:
    # 每 6 小时跑一次（00:15 / 06:15 / 12:15 / 18:15 UTC）
    - cron: '15 */6 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉取 SEC EDGAR Form 4 数据
        run: python3 scripts/fetch_form4.py

      - name: 检查是否有变化
        id: check
        run: |
          if git diff --quiet data/form4.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变化，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到 Form 4 变化"
          fi

      - name: 提交变化
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/form4.json
          git commit -m "自动更新: Form 4 数据刷新

          Triggered by GitHub Actions (6h schedule)"
          git push
