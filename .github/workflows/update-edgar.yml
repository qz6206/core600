name: 自动刷新 EDGAR (Form 4 + 8-K) 数据

on:
  schedule:
    # 每天 06:15 UTC (北京 14:15) — 之前每 6h 太频繁, 大部分股票一天没新 SEC 公告
    # 跟 fmp-extras (07:00) 错开 45 分钟避并发, 跟 translations (08:00) 也错开
    - cron: '15 6 * * *'
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉取 SEC EDGAR 数据 (Form 4 + 8-K + 6-K)
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: python3 scripts/fetch_edgar.py

      - name: 增量解析 Form 4 XML（人名/动作/股数/价格 → 中文）
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: python3 scripts/enrich_form4.py

      - name: 增量总结 8-K / 6-K 公告（DeepSeek-V3 → 中文摘要）
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python3 scripts/enrich_form8k.py

      - name: 数据完整性 + 数量 sanity check
        run: python3 scripts/validate_data.py edgar_filings

      - name: 检查变化
        id: check
        run: |
          if git diff --quiet data/edgar_filings.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变化，跳过"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到 EDGAR 数据变化"
          fi

      - name: 提交变化
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/edgar_filings.json
          git commit -m "自动更新: EDGAR 数据刷新（Form 4 + 8-K）

          Triggered by GitHub Actions (6h schedule)"
          # 防御并发 push 冲突 (其它 cron 或人工 push 同时发生)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || (echo "push 失败 (try $i), 5s 后重试" && sleep 5)
          done

      - name: 失败告警 (创建 GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 cron 失败: update-edgar (${new Date().toISOString().split('T')[0]})`,
              body: `## 自动刷新 EDGAR 数据 失败\n\n[查看 workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n常见原因:\n- SEC EDGAR 限流 / User-Agent 被封\n- DeepSeek-V3 余额耗尽\n- 数据 schema 异常 (validate 失败)\n- push 冲突 retry 3 次都不行`,
              labels: ['cron-failure']
            });
