name: 自动刷新中文翻译 (公司简介 + 财报会议)

on:
  schedule:
    # 每天早上 8:00 UTC (北京 16:00) - FMP transcript 通常 1-2 周延迟,
    # 我们每天跑一次让感知延迟从最多 1 周缩短到最多 24 小时。
    # 脚本 reused 机制保证 99% 股票跳过, 只翻译新到的 fiscal quarter
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 备份当前数据 (validate_data.py 数据骤降检查需要)
        run: |
          for f in data/descriptions_cn.json data/transcripts.json data/earnings_interpretations.json; do
            [ -f "$f" ] && cp "$f" "${f%.json}.prev.json" || true
          done

      - name: 翻译公司简介
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python3 scripts/translate_descriptions.py

      - name: 翻译财报会议 transcripts
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python3 scripts/translate_transcripts.py

      - name: 重新生成 EQR rule-based 部分 (免费)
        # transcripts 更新后, 也跑一次 generate, 让新发财报有 rule-based EQR
        run: python3 scripts/generate_earnings_interpretation.py

      - name: LLM 富化 EQR (新发布的财报, 已 done 自动跳过)
        # enrich 脚本会自动跳过 narrative_status=done 的股票, 只跑新候选
        # 一周新候选通常 5-15 只, ¥0.10-0.30
        # 4 层成本控制: 余额预检 / circuit breaker / hard cap ¥100 / 401 立刻停
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python3 scripts/enrich_eqr_with_llm.py --all

      - name: 数据完整性 + 数量 sanity check
        run: python3 scripts/validate_data.py transcripts && python3 scripts/validate_data.py earnings_interpretations

      - name: 检查变化
        id: check
        run: |
          if git diff --quiet data/descriptions_cn.json data/transcripts.json data/earnings_interpretations.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到数据变化"
          fi

      - name: 提交变化
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/descriptions_cn.json data/transcripts.json data/earnings_interpretations.json
          git commit -m "自动更新: 翻译 + EQR 富化 (DeepSeek-V3)

          Triggered by GitHub Actions (weekly schedule)"
          # 防御并发 push 冲突 (其它 cron 或人工 push 同时发生)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || (echo "push 失败 (try $i), 5s 后重试" && sleep 5)
          done

      - name: 失败告警 (创建 GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 cron 失败: update-translations (${new Date().toISOString().split('T')[0]})`,
              body: `## 自动刷新翻译 + EQR 富化 失败\n\n[查看 workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n常见原因:\n- DeepSeek-V3 余额耗尽 (translate / enrich)\n- LLM API 限流\n- 数据 schema 异常 (validate 失败)`,
              labels: ['cron-failure']
            });
