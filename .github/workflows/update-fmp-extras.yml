name: 自动刷新 FMP 杂项数据 (分析师预期/财报日历/股本动态)

on:
  schedule:
    # 每天早上 7:00 UTC（财报日历会变化，每日刷新）
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 拉取 FMP 数据 (estimates/earnings/cashflow/income/ratings)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python3 scripts/fetch_fmp_extras.py

      - name: 重新生成 EQR rule-based 部分 (免费, 不调 LLM)
        # fmp_extras 一旦更新, 财报点评的数据卡 / KPI / Beat 质量 / 健康度都可能变
        # 这一步无成本, 总跑一遍以确保 earnings_interpretations.json 反映最新数据
        run: python3 scripts/generate_earnings_interpretation.py

      - name: 数据完整性 + 数量 sanity check
        # 防 FMP 突然返 0 / schema 错乱污染网站
        run: python3 scripts/validate_data.py fmp_extras && python3 scripts/validate_data.py earnings_interpretations

      - name: 检查变化
        id: check
        run: |
          if git diff --quiet data/fmp_extras.json data/earnings_interpretations.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "检测到数据变化"
          fi

      - name: 提交变化
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fmp_extras.json data/earnings_interpretations.json
          git commit -m "自动更新: FMP 杂项 + EQR rule-based 部分刷新

          Triggered by GitHub Actions (daily schedule)"
          # 防御并发 push 冲突 (其它 cron 或人工 push 同时发生)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || (echo "push 失败 (try $i), 5s 后重试" && sleep 5)
          done

      - name: 失败告警 (创建 GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 cron 失败: update-fmp-extras (${new Date().toISOString().split('T')[0]})`,
              body: `## 自动刷新 FMP 杂项数据 失败\n\n[查看 workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n常见原因:\n- FMP API 限流 / 故障\n- 数据 schema 异常 (validate 失败)\n- push 冲突 retry 3 次都不行`,
              labels: ['cron-failure']
            });
