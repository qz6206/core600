name: 自动更新成分股列表

on:
  schedule:
    # 每周一早上 6:00 UTC（北京时间下午 2 点）
    - cron: '0 6 * * 1'
  workflow_dispatch: # 允许手动触发

concurrency:
  group: data-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 备份旧数据
        run: |
          cp data/stocks.json /tmp/stocks_old.json
          cp data/stocks.json data/stocks.prev.json  # validate_data.py 数据骤降检查

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取最新成分股
        run: |
          python3 scripts/fetch_stocks.py
          python3 scripts/fill_nasdaq_only.py

      - name: FMP 交叉验证
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python3 scripts/verify_fmp.py

      - name: 数据完整性 + 数量 sanity check
        run: python3 scripts/validate_data.py stocks

      - name: 检测变化
        id: check
        run: |
          set +e
          python3 scripts/check_changes.py /tmp/stocks_old.json > /tmp/changes.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/changes.txt
          if [ $EXIT_CODE -eq 100 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交变化
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json

          # 读取变化摘要
          if [ -f data/_changes.txt ]; then
            CHANGES=$(cat data/_changes.txt)
            rm data/_changes.txt
          else
            CHANGES="成分股变化"
          fi

          git commit -m "自动更新: 成分股变化

          $CHANGES

          Triggered by GitHub Actions"
          # 防御并发 push 冲突 (其它 cron 或人工 push 同时发生)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break || (echo "push 失败 (try $i), 5s 后重试" && sleep 5)
          done

      - name: 创建 Issue 通知
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changes = fs.readFileSync('/tmp/changes.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 成分股自动更新 - ${new Date().toISOString().split('T')[0]}`,
              body: '## 检测到成分股变化\n\n```\n' + changes + '\n```\n\n已自动提交并部署。',
              labels: ['stock-update']
            });

      - name: 失败告警 (创建 GitHub Issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 cron 失败: update-stocks (${new Date().toISOString().split('T')[0]})`,
              body: `## 自动更新成分股 失败\n\n[查看 workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['cron-failure']
            });
