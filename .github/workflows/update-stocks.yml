name: 自动更新成分股列表

on:
  schedule:
    # 每周一早上 6:00 UTC（北京时间下午 2 点）
    - cron: '0 6 * * 1'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 备份旧数据
        run: cp data/stocks.json /tmp/stocks_old.json

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 抓取最新成分股
        run: |
          python3 scripts/fetch_stocks.py
          python3 scripts/fill_nasdaq_only.py

      - name: 检测变化
        id: check
        run: |
          set +e
          python3 scripts/check_changes.py /tmp/stocks_old.json > /tmp/changes.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/changes.txt
          if [ $EXIT_CODE -eq 100 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 提交变化
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json

          # 读取变化摘要
          if [ -f data/_changes.txt ]; then
            CHANGES=$(cat data/_changes.txt)
            rm data/_changes.txt
          else
            CHANGES="成分股变化"
          fi

          git commit -m "自动更新: 成分股变化

          $CHANGES

          Triggered by GitHub Actions"
          git push

      - name: 创建 Issue 通知
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changes = fs.readFileSync('/tmp/changes.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 成分股自动更新 - ${new Date().toISOString().split('T')[0]}`,
              body: '## 检测到成分股变化\n\n```\n' + changes + '\n```\n\n已自动提交并部署。',
              labels: ['stock-update']
            });
